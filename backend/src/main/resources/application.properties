spring.application.name=mentor-platform-backend

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mentor_db}
spring.datasource.username=${DB_USERNAME:amanbhatt}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Server
server.port=${PORT:8080}

# Logging
logging.level.com.mentorplatform=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=DEBUG